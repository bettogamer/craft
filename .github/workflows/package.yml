name: Package (dev build)

# Genera 2 zips instalables en WoW en cada push a dev o main.
# NO publica en CurseForge ni Wago — solo artefactos en GitHub Actions.
# Para descargar: Actions → run → Artifacts → craft-dev-<sha>

on:
  push:
    branches: [dev, main]

jobs:
  package:
    name: Build artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ─── Assets ─────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache icon SVGs
        uses: actions/cache@v4
        with:
          path: .icon-cache
          key: lucide-icons-${{ hashFiles('docs/components/icons.md') }}

      - name: Install Python dependencies
        run: pip install Pillow cairosvg

      - name: Generate Lucide icon atlas
        run: python3 scripts/export-icons.py

      - name: Cache Inter font
        id: cache-inter
        uses: actions/cache@v4
        with:
          path: Craft/media/Inter-*.ttf
          key: inter-font-v4.0

      - name: Download Inter font
        if: steps.cache-inter.outputs.cache-hit != 'true'
        run: |
          mkdir -p Craft/media
          curl -L -o /tmp/inter.zip \
            "https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip"
          unzip -j /tmp/inter.zip "Inter-Regular.ttf" "Inter-Bold.ttf" -d Craft/media/
          rm /tmp/inter.zip

      - name: Download LibStub
        run: |
          mkdir -p Craft/libs
          curl -L -o Craft/libs/LibStub.lua \
            "https://raw.githubusercontent.com/Ace3/LibStub/master/LibStub.lua"

      - name: Verify assets
        run: |
          [ -f "Craft/media/lucide-16.tga"     ] || (echo "❌ lucide-16.tga"     && exit 1)
          [ -f "Craft/media/lucide-24.tga"     ] || (echo "❌ lucide-24.tga"     && exit 1)
          [ -f "Craft/media/Inter-Regular.ttf" ] || (echo "❌ Inter-Regular.ttf" && exit 1)
          [ -f "Craft/media/Inter-Bold.ttf"    ] || (echo "❌ Inter-Bold.ttf"    && exit 1)
          [ -f "Craft/libs/LibStub.lua"        ] || (echo "❌ LibStub.lua"       && exit 1)
          echo "✅ All assets present"

      # ─── Embeber Craft en Craft_Browser/libs/ ────────────────────────────
      - name: Embed Craft into Craft_Browser
        run: |
          mkdir -p Craft_Browser/libs
          cp -r Craft/ Craft_Browser/libs/Craft/
          echo "✅ Craft embedded in Craft_Browser/libs/Craft/"

      # ─── Build zips ──────────────────────────────────────────────────────
      - name: Build zip files
        run: |
          SHA=$(git rev-parse --short HEAD)
          BRANCH=${GITHUB_REF_NAME}
          mkdir -p dist

          # Craft.zip — para developers que quieran usar la librería
          zip -r "dist/Craft-${BRANCH}-${SHA}.zip" Craft/ \
            --exclude "*.git*" --exclude "*/__pycache__/*"

          # Craft_Browser.zip — addon showcase con Craft embebido
          zip -r "dist/CraftBrowser-${BRANCH}-${SHA}.zip" Craft_Browser/ \
            --exclude "*.git*" --exclude "*/__pycache__/*"

          echo "ZIP_NAME=craft-${BRANCH}-${SHA}" >> $GITHUB_ENV
          echo ""
          echo "📦 Artifacts:"
          ls -lh dist/

      # ─── Subir como artefactos de GitHub Actions ─────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: dist/*.zip
          retention-days: 14
