name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Package and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ─── Lint + Test ──────────────────────────────────────────────────────
      - name: Install Lua tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y luarocks lua5.1 liblua5.1-dev
          sudo luarocks install luacheck
          sudo luarocks install busted

      - name: Lint
        run: luacheck Craft/ --config .luacheckrc

      - name: Test
        run: busted tests/ --verbose

      # ─── Generar assets ───────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache icon SVGs
        uses: actions/cache@v4
        with:
          path: .icon-cache
          key: lucide-icons-${{ hashFiles('docs/components/icons.md') }}

      - name: Install Python dependencies
        run: pip install Pillow cairosvg

      - name: Generate Lucide icon atlas
        run: python3 scripts/export-icons.py

      - name: Cache Inter font
        id: cache-inter
        uses: actions/cache@v4
        with:
          path: Craft/media/Inter-*.ttf
          key: inter-font-v4.0

      - name: Download Inter font (SIL OFL 1.1)
        if: steps.cache-inter.outputs.cache-hit != 'true'
        run: |
          mkdir -p Craft/media /tmp/inter_extract
          curl -L -o /tmp/inter.zip \
            "https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip"
          unzip -q /tmp/inter.zip -d /tmp/inter_extract
          find /tmp/inter_extract -name "Inter-Regular.ttf" | head -1 \
            | xargs -I{} cp {} Craft/media/Inter-Regular.ttf
          find /tmp/inter_extract -name "Inter-Bold.ttf" | head -1 \
            | xargs -I{} cp {} Craft/media/Inter-Bold.ttf
          rm -rf /tmp/inter.zip /tmp/inter_extract

      - name: Download LibStub
        run: |
          mkdir -p Craft/libs
          curl -L -o Craft/libs/LibStub.lua \
            "https://raw.githubusercontent.com/Ace3/LibStub/master/LibStub.lua"

      - name: Verify assets
        run: |
          [ -f "Craft/media/lucide-16.tga"     ] || (echo "❌ lucide-16.tga"     && exit 1)
          [ -f "Craft/media/lucide-24.tga"     ] || (echo "❌ lucide-24.tga"     && exit 1)
          [ -f "Craft/media/Inter-Regular.ttf" ] || (echo "❌ Inter-Regular.ttf" && exit 1)
          [ -f "Craft/media/Inter-Bold.ttf"    ] || (echo "❌ Inter-Bold.ttf"    && exit 1)
          [ -f "Craft/libs/LibStub.lua"        ] || (echo "❌ LibStub.lua"       && exit 1)
          echo "✅ All assets present"

      # ─── Embeber Craft en Craft_Browser/libs/ ─────────────────────────────
      - name: Embed Craft into Craft_Browser
        run: |
          mkdir -p Craft_Browser/libs
          # LibStub en su propio folder (convención estándar WoW)
          mkdir -p Craft_Browser/libs/LibStub
          cp Craft/libs/LibStub.lua Craft_Browser/libs/LibStub/LibStub.lua
          # Craft sin su propia carpeta libs/ (LibStub ya está arriba)
          cp -r Craft/ Craft_Browser/libs/Craft/
          echo "✅ Craft embedded in Craft_Browser/libs/Craft/"
          echo "✅ LibStub at Craft_Browser/libs/LibStub.lua"
          ls Craft_Browser/libs/

      # ─── Craft.zip para GitHub Release (para developers) ─────────────────
      - name: Build Craft.zip (for developers)
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist/craft_pkg
          # LibStub en su propio folder (convención estándar WoW)
          mkdir -p dist/craft_pkg/LibStub
          cp Craft/libs/LibStub.lua dist/craft_pkg/LibStub/LibStub.lua
          cp -r Craft/ dist/craft_pkg/Craft/
          cd dist/craft_pkg
          zip -r "../Craft-${VERSION}.zip" . \
            --exclude "*.git*" --exclude "*/__pycache__/*"
          cd ../..
          rm -rf dist/craft_pkg
          echo "CRAFT_ZIP=dist/Craft-${VERSION}.zip" >> $GITHUB_ENV
          echo "📦 Built Craft-${VERSION}.zip for developers"
          echo "   Structure: LibStub.lua + Craft/"

      # ─── Craft_Browser → CurseForge + Wago via packager ──────────────────
      # ADR-0012: Craft_Browser es el único addon en CurseForge.
      # Craft está embebido en Craft_Browser/libs/Craft/ (generado arriba).
      - name: Package Craft_Browser and upload to CurseForge/Wago
        uses: BigWigsMods/packager@main
        with:
          pkgmeta-file: Craft_Browser/.pkgmeta
        env:
          CF_API_KEY:     ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH:   ${{ secrets.GITHUB_TOKEN }}

      # ─── Adjuntar Craft.zip al GitHub Release ────────────────────────────
      - name: Upload Craft.zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.CRAFT_ZIP }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
