name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Package and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ─── Lint + Test ──────────────────────────────────────────────────────
      - name: Install Lua tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y luarocks lua5.1 liblua5.1-dev
          sudo luarocks install luacheck
          sudo luarocks install busted

      - name: Lint
        run: luacheck Craft/ --config .luacheckrc

      - name: Test
        run: busted tests/ --verbose

      # ─── Generar atlas TGA de íconos Lucide ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache icon SVGs
        uses: actions/cache@v4
        with:
          path: .icon-cache
          key: lucide-icons-${{ hashFiles('docs/components/icons.md') }}

      - name: Install Python dependencies
        run: pip install Pillow cairosvg

      - name: Generate Lucide icon atlas
        run: python3 scripts/export-icons.py

      # ─── Descargar fuente Inter ──────────────────────────────────────────
      - name: Cache Inter font
        id: cache-inter
        uses: actions/cache@v4
        with:
          path: Craft/media/Inter-*.ttf
          key: inter-font-v4.0

      - name: Download Inter font (SIL OFL 1.1)
        if: steps.cache-inter.outputs.cache-hit != 'true'
        run: |
          mkdir -p Craft/media
          curl -L -o /tmp/inter.zip \
            "https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip"
          unzip -j /tmp/inter.zip "Inter-Regular.ttf" "Inter-Bold.ttf" \
            -d Craft/media/
          rm /tmp/inter.zip

      # ─── Verificar que todos los assets están listos ─────────────────────
      - name: Verify assets
        run: |
          echo "=== Craft/media/ ==="
          ls -lh Craft/media/
          [ -f "Craft/media/lucide-16.tga" ] || (echo "❌ lucide-16.tga missing" && exit 1)
          [ -f "Craft/media/lucide-24.tga" ] || (echo "❌ lucide-24.tga missing" && exit 1)
          [ -f "Craft/media/Inter-Regular.ttf" ] || (echo "❌ Inter-Regular.ttf missing" && exit 1)
          [ -f "Craft/media/Inter-Bold.ttf"    ] || (echo "❌ Inter-Bold.ttf missing"    && exit 1)
          echo "✅ All assets present"

      # ─── Empaquetar y subir a CurseForge + Wago ──────────────────────────
      # bigwigsmods/packager descarga LibStub via .pkgmeta externals,
      # empaqueta Craft/ (incluyendo media/ generada arriba) y sube el .zip
      - name: Package and upload
        uses: BigWigsMods/packager@main
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Craft_Browser package
        run: |
          # Verificar assets (generados en pasos anteriores)
          [ -f "Craft/media/lucide-16.tga" ] || (echo "❌ lucide-16.tga missing" && exit 1)
          [ -f "Craft/media/Inter-Regular.ttf" ] || (echo "❌ Inter-Regular.ttf missing" && exit 1)

          # Crear .zip de Craft_Browser
          SHA=$(git rev-parse --short HEAD)
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist
          zip -r "dist/Craft_Browser-${VERSION}.zip" Craft_Browser/ \
            --exclude "*.git*" \
            --exclude "*/__pycache__/*"
          echo "CB_ZIP=dist/Craft_Browser-${VERSION}.zip" >> $GITHUB_ENV
          echo "📦 Built: dist/Craft_Browser-${VERSION}.zip"

      - name: Upload Craft_Browser to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.CB_ZIP }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
